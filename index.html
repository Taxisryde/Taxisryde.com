<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TAXISRYDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
       .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; }
        #search-input { width: 100%; padding: 18px 20px; border-radius: 12px; border: none; font-size: 1.1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4); font-weight: 500; }
       .bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #111; border-radius: 25px 25px 0 0; padding: 20px; box-shadow: 0 -5px 30px rgba(0,0,0,0.5); z-index: 10; }
       .drag-handle { width: 40px; height: 5px; background: #444; border-radius: 3px; margin: 0 auto 15px; }
       .service-type { display: flex; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px solid #FFC107; }
       .service-icon { font-size: 2rem; margin-right: 15px; }
       .service-info { flex: 1; }
       .service-title { font-size: 1.2rem; font-weight: 700; color: white; }
       .service-desc { font-size: 0.85rem; color: #999; }
       .price { font-size: 1.4rem; font-weight: 900; color: #FFC107; }
       .address-row { display: flex; align-items: center; margin: 15px 0; color: white; }
       .dot { width: 10px; height: 10px; background: #FFC107; border-radius: 50%; margin-right: 12px; }
       .address { font-size: 0.95rem; flex: 1; }
       .request-btn { display: block; background: #25D366; color: white; padding: 20px; border-radius: 12px; font-size: 1.5rem; font-weight: 900; text-decoration: none; text-align: center; margin-top: 15px; box-shadow: 0 6px 20px rgba(37,211,102,0.4); }
       .request-btn:active { transform: scale(0.98); }
       .header-logo { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: #FFC107; color: #000; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="header-logo">TAXISRYDE 24/7</div>
    
    <div class="top-bar">
        <input id="search-input" type="text" placeholder="¿A dónde vamos? Busca o arrastra el pin">
    </div>
    
    <div id="map"></div>

    <div class="bottom-sheet">
        <div class="drag-handle"></div>
        
        <div class="service-type">
            <div class="service-icon">🚖</div>
            <div class="service-info">
                <div class="service-title">TaxiRyde Standard</div>
                <div class="service-desc">Viaje al Aeropuerto GSP • 24/7</div>
            </div>
            <div class="price" id="price">$35-45</div>
        </div>

        <div class="address-row">
            <div class="dot"></div>
            <div class="address" id="pickup-address">Mueve el pin para tu ubicación</div>
        </div>

        <a href="tel:8643626496" class="request-btn">SOLICITAR TAXI • 864-362-6496</a>
    </div>

    <script>
        let map, marker, geocoder, directionsService;
        let miUbicacion = { lat: 34.8526, lng: -82.3940 };
        const aeropuerto = { lat: 34.8956, lng: -82.2189 };

        function initMap() {
            geocoder = new google.maps.Geocoder();
            directionsService = new google.maps.DirectionsService();
            
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: miUbicacion,
                disableDefaultUI: true,
                gestureHandling: 'greedy',
                styles: [{"elementType":"geometry","stylers":[{"color":"#212121"}]},{"elementType":"labels.icon","stylers":[{"visibility":"off"}]},{"elementType":"labels.text.fill","stylers":[{"color":"#757575"}]},{"elementType":"labels.text.stroke","stylers":[{"color":"#212121"}]},{"featureType":"administrative","elementType":"geometry","stylers":[{"color":"#757575"}]},{"featureType":"administrative.country","elementType":"labels.text.fill","stylers":[{"color":"#9e9e9e"}]},{"featureType":"administrative.locality","elementType":"labels.text.fill","stylers":[{"color":"#bdbdbd"}]},{"featureType":"poi","elementType":"labels.text.fill","stylers":[{"color":"#757575"}]},{"featureType":"poi.park","elementType":"geometry","stylers":[{"color":"#181818"}]},{"featureType":"poi.park","elementType":"labels.text.fill","stylers":[{"color":"#616161"}]},{"featureType":"poi.park","elementType":"labels.text.stroke","stylers":[{"color":"#1b1b1b"}]},{"featureType":"road","elementType":"geometry.fill","stylers":[{"color":"#2c2c2c"}]},{"featureType":"road","elementType":"labels.text.fill","stylers":[{"color":"#8a8a8a"}]},{"featureType":"road.arterial","elementType":"geometry","stylers":[{"color":"#373737"}]},{"featureType":"road.highway","elementType":"geometry","stylers":[{"color":"#3c3c3c"}]},{"featureType":"road.local","elementType":"labels.text.fill","stylers":[{"color":"#616161"}]},{"featureType":"transit","elementType":"labels.text.fill","stylers":[{"color":"#757575"}]},{"featureType":"water","elementType":"geometry","stylers":[{"color":"#000000"}]},{"featureType":"water","elementType":"labels.text.fill","stylers":[{"color":"#3d3d3d"}]}]
            });

            marker = new google.maps.Marker({
                position: miUbicacion,
                map: map,
                draggable: true,
                icon: {
                    url: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png",
                    scaledSize: new google.maps.Size(60, 60)
                },
                animation: google.maps.Animation.DROP
            });

            const input = document.getElementById("search-input");
            const searchBox = new google.maps.places.SearchBox(input);
            
            searchBox.addListener("places_changed", () => {
                const places = searchBox.getPlaces();
                if (places.length == 0) return;
                miUbicacion = places[0].geometry.location.toJSON();
                map.setCenter(miUbicacion);
                marker.setPosition(miUbicacion);
                updateLocation(miUbicacion);
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    miUbicacion = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };
                    map.setCenter(miUbicacion);
                    marker.setPosition(miUbicacion);
                    updateLocation(miUbicacion);
                });
            }

            marker.addListener("dragend", () => {
                miUbicacion = marker.getPosition().toJSON();
                updateLocation(miUbicacion);
            });

            updateLocation(miUbicacion);
        }

        function updateLocation(latlng) {
            geocoder.geocode({ location: latlng }, (results, status) => {
                if (status === "OK" && results[0]) {
                    document.getElementById("pickup-address").textContent = results[0].formatted_address;
                }
            });

            directionsService.route({
                origin: latlng,
                destination: aeropuerto,
                travelMode: 'DRIVING'
            }, (response, status) => {
                if (status === 'OK') {
                    const distanciaMillas = response.routes[0].legs[0].distance.value / 1609.34;
                    let precioBase = 15;
                    let precioPorMilla = 2.5;
                    let estimado = Math.round(precioBase + (distanciaMillas * precioPorMilla));
                    let rangoBajo = estimado - 5;
                    let rangoAlto = estimado + 5;
                    document.getElementById("price").textContent = `$${rangoBajo}-${rangoAlto}`;
                }
            });
        }
    </script>
    
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB_3N7Nqz5W3z8z8z8z8z8&libraries=places&callback=initMap">
    </script>
</body>
</html>
